<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenPulse - Réinitialiser le mot de passe</title>
    <link rel="stylesheet" href="./assets/css/auth.css" />
  </head>
  <body>
    <main class="page">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true">
          <img src="./assets/logo.png" alt="Logo GreenPulse" />
        </div>
        <div class="brand__tagline">Définissez un nouveau mot de passe pour votre compte</div>
      </div>

      <section class="card" aria-label="Réinitialisation du mot de passe">
        <div class="panel is-active" style="display:block;">
          <div class="titleblock">
            <div class="title">Nouveau mot de passe</div>
            <div class="subtitle">Utilisez le lien reçu par email pour finaliser la réinitialisation.</div>
          </div>

          <form id="newPasswordForm" class="form" novalidate>
            <div class="field">
              <label class="label" for="newPassword">Nouveau mot de passe</label>
              <div class="control">
                <span class="icon" aria-hidden="true">🔒</span>
                <input id="newPassword" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
              </div>
              <div class="hint" data-hint-for="newPassword"></div>
            </div>

            <div class="field">
              <label class="label" for="newPassword2">Confirmer le mot de passe</label>
              <div class="control">
                <span class="icon" aria-hidden="true">🔒</span>
                <input id="newPassword2" name="password2" type="password" placeholder="••••••••" autocomplete="new-password" required />
              </div>
              <div class="hint" data-hint-for="newPassword2"></div>
            </div>

            <button class="btn" type="submit">Mettre à jour</button>

            <div class="alert" id="newPasswordAlert" role="status" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <footer class="footer">© 2026 GreenPulse. Tous droits réservés.</footer>
    </main>

    <script src="./assets/js/reset-password.js" defer></script>
  </body>
</html>
