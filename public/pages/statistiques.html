<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPulse - Statistiques</title>
    <link rel="stylesheet" href="../assets/css/app-shell.css">
    <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
    <link rel="stylesheet" href="../assets/css/statistiques.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="app-page" data-required-role="animateur">

    <nav class="navbar">
        <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
        <div class="nav-links">
            <a href="gestionDefis.html">Gestion des defis</a>
            <a href="moderation.html">Moderation</a>
            <a class="active" href="statistiques.html">Statistiques</a>
            <a href="compteAnimateur.html">Compte</a>
        </div>
        <div class="nav-right">
            <div class="role-badge animateur">Animateur DD</div>
            <button type="button" class="logout-btn" data-logout title="Deconnexion"><i
                    class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="app-shell">

        <!-- LOADING -->
        <div class="loading-state" id="loading">
            <i class="fas fa-spinner fa-spin"></i> Chargement des statistiques...
        </div>

        <!-- CONTENU -->
        <div id="contenu" class="hidden" style="display:flex; flex-direction:column; gap:18px;">

            <!-- KPIs GLOBAUX -->
            <section class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-trophy"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">Défis ce mois</span>
                        <span class="kpi-value" id="kpi-defis">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-users"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">Participants</span>
                        <span class="kpi-value" id="kpi-participants">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-leaf"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">kg CO₂ économisés</span>
                        <span class="kpi-value" id="kpi-co2">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-tags"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">Thématiques</span>
                        <span class="kpi-value" id="kpi-themes">0</span>
                    </div>
                </div>
            </section>

            <!-- GRILLE STATS -->
            <div class="stats-grid">

                <!-- PARTICIPANTS PAR DÉFI -->
                <section class="stat-panel">
                    <h2 class="panel-title">
                        <i class="fas fa-chart-bar"></i> Participants par défi
                    </h2>
                    <div id="chart-defis" class="bar-chart"></div>
                </section>

                <!-- STATS PAR THÉMATIQUE -->
                <section class="stat-panel">
                    <h2 class="panel-title">
                        <i class="fas fa-chart-pie"></i> Stats par thématique
                    </h2>
                    <div id="chart-themes" class="theme-list"></div>
                </section>

            </div>

            <!-- TAUX DE VALIDATION -->
            <section class="stat-panel full-width">
                <h2 class="panel-title">
                    <i class="fas fa-check-double"></i> Taux de validation des actions
                </h2>
                <div id="chart-validation" class="validation-list"></div>
            </section>

        </div>

        <!-- ERREUR -->
        <div id="erreur" class="erreur-state hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="erreur-msg"></p>
        </div>

    </div>

    <script src="../assets/js/app-shell.js" defer></script>
    <script src="../assets/js/statistiques.js" defer></script>
</body>

</html>
