<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPulse - Statistiques</title>
    <link rel="stylesheet" href="../assets/css/app-shell.css">
    <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
    <link rel="stylesheet" href="../assets/css/statistiques.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="app-page" data-required-role="animateur">

    <nav class="navbar">
        <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
        <div class="nav-links">
            <a href="parametresAnimateur.html">Dashboard</a>
            <a href="gestionDefis.html">Gestion des defis</a>
            <a href="moderation.html">Moderation</a>
            <a class="active" href="statistiques.html">Statistiques</a>
        </div>
        <div class="nav-right">
            <div class="role-badge animateur">Animateur DD</div>
            <button type="button" class="logout-btn" data-logout title="Deconnexion"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="app-shell">

        <!-- LOADING -->
        <div class="loading-state" id="loading">
            <i class="fas fa-spinner fa-spin"></i> Chargement des statistiques...
        </div>

        <!-- CONTENU -->
        <div id="contenu" class="hidden" style="display:flex; flex-direction:column; gap:18px;">
            <!-- SÉLECTEUR DE VUE -->
        <section class="filtre-vue">
            <div class="filtre-btns">
                <button class="filtre-btn active" id="btn-global" onclick="changerFiltre('global')">
                    <i class="fas fa-globe"></i> Vue globale
                </button>
                <button class="filtre-btn" id="btn-employe" onclick="changerFiltre('employe')">
                    <i class="fas fa-user"></i> Par employé
                </button>
                <button class="filtre-btn" id="btn-equipe" onclick="changerFiltre('equipe')">
                    <i class="fas fa-users"></i> Par équipe
                </button>
            </div>

            <div id="select-employe" class="filtre-select hidden">
                <select id="dropdown-employe" onchange="appliquerFiltre()">
                    <option value="">-- Choisir un employé --</option>
                </select>
            </div>

            <div id="select-equipe" class="filtre-select hidden">
                <select id="dropdown-equipe" onchange="appliquerFiltre()">
                    <option value="">-- Choisir une équipe --</option>
                </select>
            </div>

            <div class="filtre-label" id="filtre-label">
                <i class="fas fa-chart-line"></i> Statistiques globales du mois
            </div>
        </section>
            <!-- KPIs GLOBAUX -->
            <section class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-trophy"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">Défis ce mois</span>
                        <span class="kpi-value" id="kpi-defis">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-users"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">Validations</span>
                        <span class="kpi-value" id="kpi-participants">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-leaf"></i></div>
                    <div class="kpi-body">
                        <span class="kpi-label">kg CO₂ économisés</span>
                        <span class="kpi-value" id="kpi-co2">0</span>
                    </div>
                </div>
            <div class="kpi-card">
                <div class="kpi-icon"><i class="fas fa-tags"></i></div>
                <div class="kpi-body">
                    <span class="kpi-label">Thématique du mois</span>
                    <span class="kpi-value" id="kpi-themes" style="font-size:18px;"></span>
                </div>
            </div>
            </section>

            <!-- GRILLE STATS -->
            <div class="stats-grid">

                <!-- PARTICIPANTS PAR DÉFI -->
                <section class="stat-panel">
                    <h2 class="panel-title">
                        <i class="fas fa-chart-bar"></i> Validations par défi
                    </h2>
                    <div id="chart-defis" class="bar-chart"></div>
                </section>

            <!-- STATS PAR DÉFI -->
            <section class="stat-panel">
                <h2 class="panel-title">
                    <i class="fas fa-chart-pie"></i> Stats par défi
                </h2>
                <div id="chart-themes" class="theme-list"></div>
            </section>

            </div>

            <!-- TAUX DE VALIDATION -->
            <section class="stat-panel full-width">
                <h2 class="panel-title">
                    <i class="fas fa-check-double"></i> Taux de validation des actions
                </h2>
                <div id="chart-validation" class="validation-list"></div>
            </section>

        </div>

        <!-- ERREUR -->
        <div id="erreur" class="erreur-state hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="erreur-msg"></p>
        </div>

    </div>

    <script src="../assets/js/app-shell.js" defer></script>
    <script src="../assets/js/statistiques.js" defer></script>
</body>
</html>
