<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GreenPulse - Detail Equipe</title>
        <link rel="stylesheet" href="../assets/css/app-shell.css" />
        <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
        <link rel="stylesheet" href="../assets/css/detailEquipe.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    </head>
    <body class="app-page" data-required-role="employe">
        <nav class="navbar">
            <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
            <div class="nav-links">
                <a href="dashboardE.html">Dashboard</a>
                <a href="defis.html">Defis</a>
                <a href="classement.html">Classement</a>
                <a class="active" href="detailEquipe.html?id=current">Equipe</a>
                <a href="profil.html">Mon profil</a>
            </div>
            <div class="nav-right">
                <div class="role-badge employe">Employe</div>
                <button type="button" class="logout-btn" data-logout title="Deconnexion"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>
        <main class="app-shell employee-layout">
            <a class="back-link" href="classement.html">&#8592; Retour au classement</a>

            <!-- Team hero -->
            <section class="panel team-hero" data-team-header>
                <div class="team-hero-main">
                    <p class="eyebrow" data-team-rank>Classement</p>
                    <h1 data-team-name>Equipe</h1>
                </div>
                <div class="team-hero-kpis" data-team-stats></div>
            </section>

            <!-- Main grid: left = membres + progression, right = succes -->
            <div class="team-main-grid">

                <div class="team-left-col">
                    <!-- Membres -->
                    <article class="panel members-panel">
                        <h2 class="section-title">Membres</h2>
                        <ul class="members-list" data-members-list>
                            <li class="member-row is-loading">Chargement...</li>
                        </ul>
                    </article>

                    <!-- Progression défis du mois -->
                    <article class="panel progression-panel">
                        <h2 class="section-title">Defis du mois</h2>
                        <div class="progression-list" data-challenge-progress>
                            <div class="progression-empty">Chargement...</div>
                        </div>
                    </article>
                </div>

                <div class="team-right-col">
                    <!-- Derniers succès -->
                    <article class="panel succes-panel">
                        <h2 class="section-title">Derniers succes</h2>
                        <ul class="succes-list" data-achievements-list>
                            <li class="succes-item is-loading">Chargement...</li>
                        </ul>
                    </article>
                </div>

            </div>
        </main>

        <script src="../asse../app-shell.js" defer></script>
        <script src="../asse../detailEquipe.js" defer></script>
    </body>
</html>
