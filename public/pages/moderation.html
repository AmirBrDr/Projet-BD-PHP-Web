<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenPulse - Moderation</title>
    <link rel="stylesheet" href="../assets/css/app-shell.css" />
    <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
    <link rel="stylesheet" href="../assets/css/moderation.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body class="app-page" data-required-role="animateur">
    <nav class="navbar">
        <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
        <div class="nav-links">
            <a href="gestionDefis.html">Gestion des defis</a>
            <a href="gestionCatalogue.html">Catalogue</a>
            <a class="active" href="moderation.html">Moderation</a>
            <a href="statistiques.html">Statistiques</a>
            <a href="compteAnimateur.html">Compte</a>
        </div>
        <div class="nav-right">
            <div class="role-badge animateur">Animateur DD</div>
            <button type="button" class="logout-btn" data-logout title="Deconnexion"><i
                    class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>
    <main class="app-shell">
        <section class="panel page-intro">
            <h1>Moderation des reponses employe</h1>
            <p>
                Les reponses envoyees par les employes sont centralisees ici. Vous pouvez les approuver
                ou les refuser avec un commentaire.
            </p>
        </section>

        <div id="page-alert" class="page-alert" hidden></div>

        <section class="panel replies-panel">
            <div class="panel-head">
                <h2>Liste des reponses</h2>
                <div class="filters-row">
                    <select id="reply-status-filter">
                        <option value="all">Tous les statuts</option>
                        <option value="pending" selected>En attente</option>
                        <option value="approved">Approuvees</option>
                        <option value="rejected">Refusees</option>
                    </select>
                    <select id="reply-challenge-filter">
                        <option value="all">Tous les defis</option>
                    </select>
                </div>
            </div>
            <div id="reply-list" class="reply-list"></div>
        </section>
    </main>

    <script src="../assets/js/app-shell.js" defer></script>
    <script src="../assets/js/dialog-runtime.js" defer></script>
    <script src="../assets/js/moderation.js" defer></script>
</body>

</html>
