<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GreenPulse - Defis Employe</title>
        <link rel="stylesheet" href="../assets/css/app-shell.css" />
        <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
        <link rel="stylesheet" href="../assets/css/defis.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    </head>
    <body class="app-page" data-required-role="employe">
        <nav class="navbar">
            <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
            <div class="nav-links">
                <a href="dashboardE.html">Dashboard</a>
                <a class="active" href="defis.html">Defis</a>
                <a href="classement.html">Classement</a>
                <a href="detailEquipe.html?id=current">Equipe</a>
                <a href="profil.html">Mon profil</a>
            </div>
            <div class="nav-right">
                <div class="role-badge employe">Employe</div>
                <button type="button" class="logout-btn" data-logout title="Deconnexion"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>
        <main class="app-shell employee-layout">
            <section class="panel page-intro">
                <p class="eyebrow">Progression collective</p>
                <h1>Le parcours eco-responsable de votre equipe</h1>
                <p>
                    Debloquez chaque etape dans l'ordre. Chaque validation individuelle fait progresser
                    l'equipe complete.
                </p>
                <div class="team-progress-banner" data-team-progress></div>
                <div class="filter-row" role="group" aria-label="Filtres des defis">
                    <button class="filter-btn is-active" type="button" data-filter="all">Tous</button>
                    <button class="filter-btn" type="button" data-filter="active">En cours</button>
                    <button class="filter-btn" type="button" data-filter="completed">Termines</button>
                    <button class="filter-btn" type="button" data-filter="locked">Verrouilles</button>
                </div>
            </section>

            <section class="timeline-container panel" aria-label="Timeline des defis">
                <div class="timeline-list" data-timeline-list>
                    <article class="challenge-step is-loading">Chargement des etapes...</article>
                </div>
            </section>
        </main>

        <script src="../assets/js/app-shell.js" defer></script>
        <script src="../assets/js/defis.js" defer></script>
    </body>
</html>
