<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GreenPulse - Classement Equipes</title>
        <link rel="stylesheet" href="../assets/css/app-shell.css" />
        <link rel="stylesheet" href="../assets/css/unified-navbar.css" />
        <link rel="stylesheet" href="../assets/css/classement.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    </head>
    <body class="app-page" data-required-role="employe">
        <nav class="navbar">
            <img src="../assets/logo.png" alt="GreenPulse" class="nav-logo" />
            <div class="nav-links">
                <a href="dashboardE.html">Dashboard</a>
                <a href="defis.html">Defis</a>
                <a class="active" href="classement.html">Classement</a>
                <a href="detailEquipe.html?id=current">Equipe</a>
                <a href="profil.html">Mon profil</a>
            </div>
            <div class="nav-right">
                <div class="role-badge employe">Employe</div>
                <button type="button" class="logout-btn" data-logout title="Deconnexion"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>
        <main class="app-shell employee-layout">
            <section class="panel ranking-header">
                <h1>Classement global</h1>
                <p>Points cumules et CO2 evite par equipe.</p>
            </section>

            <section class="podium" data-podium></section>

            <section class="panel list-panel">
                <div class="list-head">
                    <h2>Classement complet</h2>
                    <span class="teams-count" data-teams-count>0 equipes</span>
                </div>
                <ul class="team-list" data-team-list>
                    <li class="team-row is-loading">Chargement du classement...</li>
                </ul>
            </section>
        </main>

        <script src="../assets/js/app-shell.js" defer></script>
        <script src="../assets/js/classement.js" defer></script>
    </body>
</html>
