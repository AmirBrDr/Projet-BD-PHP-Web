# HTTP: redirection vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.tld www.your-domain.tld;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.tld www.your-domain.tld;

    # Certificats Let's Encrypt (adapter les chemins)
    ssl_certificate /etc/letsencrypt/live/your-domain.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.tld/privkey.pem;

    # Dossier front statique
    root /home/runner/work/Projet-BD-PHP-Web/Projet-BD-PHP-Web/dev/GreenPulse/public;
    index auth.html;

    # Sécurité de base
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Bloquer les fichiers cachés et sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(sql|env|ini|log|sh|ps1)$ {
        deny all;
    }

    # Routes front
    location = / {
        try_files /auth.html =404;
    }

    location = /login {
        try_files /auth.html =404;
    }

    location = /register {
        try_files /auth.html =404;
    }

    location = /login.php {
        try_files /auth.html =404;
    }

    location = /register.php {
        try_files /auth.html =404;
    }

    # Assets statiques
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Bloquer les fichiers internes API
    location ~ ^/api/(config|bootstrap|lib/.*)\.php$ {
        return 403;
    }

    # Exécuter uniquement les endpoints PHP sous /api/
    location ~ ^/api/(.+\.php)$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /home/runner/work/Projet-BD-PHP-Web/Projet-BD-PHP-Web/dev/GreenPulse/api/$1;
        fastcgi_param DOCUMENT_ROOT /home/runner/work/Projet-BD-PHP-Web/Projet-BD-PHP-Web/dev/GreenPulse/api;
        fastcgi_pass unix:/run/php/php8.2-fpm-greenpulse.sock;
    }

    # Si /api/ n'est pas un .php connu
    location ^~ /api/ {
        return 404;
    }

    # Fallback général
    location / {
        try_files $uri /auth.html;
    }
}
