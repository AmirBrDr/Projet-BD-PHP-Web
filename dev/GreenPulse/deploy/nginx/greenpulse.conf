# HTTP: redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.tld www.your-domain.tld;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.tld www.your-domain.tld;

    # Let's Encrypt certificates (adjust paths)
    ssl_certificate /etc/letsencrypt/live/your-domain.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.tld/privkey.pem;

    # Static frontend directory
    root /srv/greenpulse/public;
    index auth.html;

    # Basic security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Block hidden and sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(sql|env|ini|log|sh|ps1)$ {
        deny all;
    }

    # Frontend routes
    location = / {
        try_files /auth.html =404;
    }

    location = /login {
        try_files /auth.html =404;
    }

    location = /register {
        try_files /auth.html =404;
    }

    location = /login.php {
        try_files /auth.html =404;
    }

    location = /register.php {
        try_files /auth.html =404;
    }

    # Static assets
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Block internal API files
    location ~ ^/api/(config|bootstrap|lib/.*)\.php$ {
        return 403;
    }

    # Execute only PHP endpoints under /api/
    location ~ ^/api/(.+\.php)$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /srv/greenpulse/api/$1;
        fastcgi_param DOCUMENT_ROOT /srv/greenpulse/api;
        fastcgi_pass unix:/run/php/php8.2-fpm-greenpulse.sock;
    }

    # If /api/ is not a known .php file
    location ^~ /api/ {
        return 404;
    }

    # General fallback
    location / {
        try_files $uri /auth.html;
    }
}
