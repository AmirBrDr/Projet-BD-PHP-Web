[greenpulse]
user = www-data
group = www-data

listen = /run/php/php8.2-fpm-greenpulse.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Required to read environment variables from systemd
clear_env = no

; Restrict executable extensions
security.limit_extensions = .php

; Limit file access to the application
php_admin_value[open_basedir] = /srv/greenpulse:/tmp:/usr/share/php

; Dedicated PHP pool logs
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.2-fpm-greenpulse.log
catch_workers_output = yes

env[GP_DB_HOST] = $GP_DB_HOST
env[GP_DB_PORT] = $GP_DB_PORT
env[GP_DB_NAME] = $GP_DB_NAME
env[GP_DB_USER] = $GP_DB_USER
env[GP_DB_PASS] = $GP_DB_PASS
env[GP_JWT_SECRET] = $GP_JWT_SECRET
env[GP_JWT_ISSUER] = $GP_JWT_ISSUER
env[GP_JWT_AUDIENCE] = $GP_JWT_AUDIENCE
env[GP_JWT_TTL] = $GP_JWT_TTL
env[GP_CORS_ORIGIN] = $GP_CORS_ORIGIN
env[GP_DEBUG] = $GP_DEBUG
