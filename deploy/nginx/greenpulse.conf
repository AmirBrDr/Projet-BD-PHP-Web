# HTTP Server - Private Network
server {
    listen 80;
    listen [::]:80;
    server_name greenpulse.stri www.greenpulse.stri;

    # Keep CSP in one place for easier maintenance
    set $gp_csp "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'";

    # Static frontend directory
    root /srv/greenpulse/public;
    index auth.html;

    # Basic security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy $gp_csp always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Block hidden and sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(sql|env|ini|log|sh|ps1)$ {
        deny all;
    }

    # Frontend routes
    location = / {
        try_files /auth.html =404;
    }

    location = /login {
        try_files /auth.html =404;
    }

    location = /register {
        try_files /auth.html =404;
    }

    # Legacy frontend-style routes kept for compatibility with router.php behavior
    location = /login.php {
        try_files /auth.html =404;
    }

    location = /register.php {
        try_files /auth.html =404;
    }

    # Static assets
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy $gp_csp always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Block internal API files
    location ~ ^/api/(config|bootstrap|lib/.*)\.php$ {
        return 403;
    }

    # Execute only PHP endpoints under /api/
    location ~ ^/api/(.+\.php)$ {
        root /srv/greenpulse;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME /srv/greenpulse/api/$1;
        fastcgi_param DOCUMENT_ROOT /srv/greenpulse/api;
        fastcgi_pass unix:/run/php/php8.4-fpm-greenpulse.sock;
    }

    # If /api/ is not a known .php file
    location /api/ {
        return 404;
    }

    # General fallback
    location / {
        try_files $uri /auth.html;
    }
}
